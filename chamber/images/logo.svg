<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Purple Star Background -->
  <polygon points="250,20 290,140 420,100 360,220 480,250 360,280 420,400 290,360 250,480 210,360 80,400 140,280 20,250 140,220 80,100 210,140" fill="#4B3B73" />
  
  <!-- Outer Grey Ring -->
  <circle cx="250" cy="250" r="80" fill="#7D849D" />
  
  <!-- Light Blue Dots in Ring -->
  <g fill="#B4C0D1">
    <circle cx="250" cy="155" r="7.5" />
    <circle cx="283" cy="160" r="7.5" />
    <circle cx="313" cy="175" r="7.5" />
    <circle cx="335" cy="200" r="7.5" />
    <circle cx="345" cy="230" r="7.5" />
    <circle cx="345" cy="270" r="7.5" />
    <circle cx="335" cy="300" r="7.5" />
    <circle cx="313" cy="325" r="7.5" />
    <circle cx="283" cy="340" r="7.5" />
    <circle cx="250" cy="345" r="7.5" />
    <circle cx="217" cy="340" r="7.5" />
    <circle cx="187" cy="325" r="7.5" />
    <circle cx="165" cy="300" r="7.5" />
    <circle cx="155" cy="270" r="7.5" />
    <circle cx="155" cy="230" r="7.5" />
    <circle cx="165" cy="200" r="7.5" />
    <circle cx="187" cy="175" r="7.5" />
    <circle cx="217" cy="160" r="7.5" />
  </g>

  <!-- Green Core -->
  <circle cx="250" cy="250" r="55" fill="#7EA041" />
  
  <!-- Yellow Spiral/Swirl -->
  <path d="M250,220 Q280,220 280,250 Q280,280 250,280 Q220,280 220,250 Q220,225 240,225" fill="none" stroke="#C4B454" stroke-width="4" opacity="0.6" />

  <!-- Central Red Emblem -->
  <g fill="#932808">
    <circle cx="250" cy="250" r="15" />
    <!-- Top node -->
    <path d="M250,250 L235,195" stroke="#932808" stroke-width="9" stroke-linecap="round" />
    <circle cx="235" cy="195" r="11" />
    <!-- Bottom Right node -->
    <path d="M250,250 L310,275" stroke="#932808" stroke-width="9" stroke-linecap="round" />
    <circle cx="310" cy="275" r="11" />
    <!-- Bottom Left node -->
    <path d="M250,250 L205,290" stroke="#932808" stroke-width="9" stroke-linecap="round" />
    <circle cx="205" cy="290" r="11" />
  </g>
</svg>
