<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Fernando Añaña" />
    <meta
      name="description"
      content="In AstroDaily discover a stunning new cosmic image every day, explore powerful telescope galleries, and wander through distant galaxies."
    />
    <meta
      property="og:description"
      content="In AstroDaily discover a stunning new cosmic image every day, explore powerful telescope galleries, and wander through distant galaxies."
    />
    <meta property="og:image" content="" />
    <meta property="og:title" content="AstroDaily" />
    <meta
      property="og:url"
      content="https://feranana.github.io/wdd231/final/index.html"
    />
    <link rel="stylesheet" href="styles/normalize.css" />
    <link rel="stylesheet" href="styles/small.css" />
    <link rel="stylesheet" href="styles/medium.css" />
    <link rel="stylesheet" href="styles/large.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@200..700&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.ico" />
    <script src="scripts/modules.mjs" type="module"></script>
    <title>Picture of the Day - AstroDaily</title>
  </head>
  <body>
    <header>
      <div class="header-menu">
        <img src="images/logo.svg" width="50" height="50" alt="Logo" />
        <span><a href="#">AstroDaily</a></span>
        <button id="ham-btn" class="hamburger" aria-label="Menu"></button>
        <nav id="nav-bar" class="navigation">
          <ul>
            <li>
              <a href="https://feranana.github.io/wdd231/final/index.html"
                >Home</a
              >
            </li>
            <li>
              <a href="#" class="current">Picture of the Day</a>
            </li>
            <li>
              <a href="https://feranana.github.io/wdd231/final/gallery.html"
                >Gallery</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <h1>Picture of the Day</h1>
      <div id="pod" class="pofd"></div>
      <h2 class="form-title">Recieve daily pictures of the day to your email!</h2>
      <form method="get" action="subscription.html">
        <h3>Personal Information</h3>
        <label for="first">Name</label>
        <input
          type="text"
          id="first"
          name="first-name"
          required
          title="Your name"
          autocomplete="given-name"
        />
        <label for="last">Last Name</label>
        <input
          type="text"
          id="last"
          name="last-name"
          required
          title="Your last name"
          autocomplete="family-name"
        />
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="my_email@gmail.com"
          required
          title="Your email"
          autocomplete="email"
        />
        <input type="hidden" name="timestamp" id="timestamp" />
        <input type="submit" value="Subscribe" />
      </form>
    </main>
    <footer>
      <div class="address">
        <p><strong>AstroDaily</strong></p>
        <p>astrodaily@email.org</p>
        <p>(1)472-0000</p>
        <a href="#">Youtube video</a>
      </div>
      <div class="social-media">
        <a href="https://github.com/FerAnana/"
          ><img
            src="images/github.svg"
            width="50"
            height="50"
            alt="Youtube logo"
            loading="lazy"
        /></a>
        <a href="https://www.instagram.com/fer_anana/"
          ><img
            src="images/instagram.svg"
            width="50"
            height="50"
            alt="X logo"
            loading="lazy"
        /></a>
        <a href="https://https://www.linkedin.com/in/fernando-anana/"
          ><img
            src="images/linkedin.svg"
            width="50"
            height="50"
            alt="Linkedin logo"
            loading="lazy"
        /></a>
      </div>
      <div class="student-info">
        <p>WDD231 Class Project</p>
        <p>Fernando Añaña</p>
        <p>©<span id="currentYear"></span> AstroDaily</p>
        <p id="lastModified"></p>
      </div>
    </footer>
  </body>
</html>
