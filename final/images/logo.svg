<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
  <!-- Background circle matching the deep space vibe (optional, remove for transparent) -->
  <circle cx="22" cy="22" r="20" fill="#1b106a" />
  
  <!-- The Planet Rings (Angled) -->
  <ellipse cx="22" cy="22" rx="16" ry="5" fill="none" stroke="#cb04a5" stroke-width="2.5" transform="rotate(-25 22 22)" />
  
  <!-- Back half of the planet ring mask (to give 3D depth) -->
  <!-- Main Planet Body -->
  <circle cx="22" cy="22" r="9" fill="#65334d" />
  
  <!-- Front half of the ring overlapping the planet -->
  <path d="M 7.5 25 A 16 5 0 0 0 31.5 14" fill="none" stroke="#f433ab" stroke-width="2.5" transform="rotate(-25 22 22)" />
  
  <!-- Tiny distant star/sparkle -->
  <polygon points="31,12 32,15 35,16 32,17 31,20 30,17 27,16 30,15" fill="white" />
</svg>
